<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Deposit</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0f172b;
            margin-bottom: 20px;
        }

        .info {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #374151;
            line-height: 1.6;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #f54900;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #d63f00;
        }

        .nav {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 13px;
        }

        .back {
            background: #0f172b;
            color: white;
        }

        .list {
            background: #e5e7eb;
            color: #111;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="box">

        <h2>Record Deposit Payment</h2>

        <!-- NAV -->
        <div class="nav">
            <a href="{% url 'deposit_dashboard' %}" class="back">Dashboard</a>
            <a href="{% url 'deposit_list' %}" class="list">Deposit List</a>
        </div>

        <!-- DEPOSIT INFO -->
        <div class="info">
            <strong>Customer:</strong> {{ scheme.customer.name }} <br>
            <strong>Product:</strong> {{ scheme.product.name }} <br>
            <strong>Quantity Expected:</strong> {{ scheme.quantity_expected }} <br>
            <strong>Amount Already Paid:</strong> {{ scheme.amount_paid }} <br>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <label>Amount Paid</label>
            <input type="number" name="amount_paid" step="0.01" required>

            <label>Payment Method</label>
            <select name="payment_method">
                <option value="cash">Cash</option>
                <option value="mtn">MTN Mobile Money</option>
                <option value="airtel">Airtel Money</option>
                <option value="card">Bank Card</option>
            </select>

            <label>Comment</label>
            <textarea name="comment" placeholder="Optional note..."></textarea>

            <button type="submit">Save Payment</button>
        </form>

    </div>

</div>

</body>
</html>
