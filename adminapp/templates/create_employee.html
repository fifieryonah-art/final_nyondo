<!DOCTYPE html>
<html>
<head>
<title>Create Employee</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 40px 20px;
    color: #0f172b;
}

.card {
    width: 100%;
    max-width: 600px;
    background: #ffffff;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 4px 12px rgba(15, 23, 43, 0.08);
    border-top: 5px solid #0f172b;
    margin: 0 auto;
}

h2 {
    text-align: center;
    color: #0f172b;
    font-size: 32px;
    margin-bottom: 24px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin: 0;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 15px;
    box-sizing: border-box;
}

input:focus, select:focus {
    border-color: #0f172b;
    box-shadow: 0 0 0 3px rgba(15, 23, 43, 0.08);
    outline: none;
}

.input-error {
    border: 2px solid #dc2626 !important;
    background: #fff5f5 !important;
}

.field-error-msg {
    color: #b91c1c;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
    display: block;
}

.btn-save {
    width: 100%;
    padding: 14px;
    background: #0f172b;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    margin-top: 8px;
    transition: all 0.2s ease;
}

.btn-save:hover {
    background: #1e293b;
    transform: translateY(-1px);
}

.back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-top: 14px;
    padding: 12px 16px;
    text-decoration: none;
    color: #0f172b;
    background: #e2e8f0;
    border-radius: 10px;
    font-weight: 700;
    transition: all 0.2s ease;
}

.back:hover {
    background: #cbd5e1;
    transform: translateY(-1px);
}
</style>

</head>

<body>

<div class="card">

    <h2>Create Employee</h2>

    <form method="POST" novalidate>
        {% csrf_token %}
        {% if form.errors %}
            <div style="background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;padding:12px;border-radius:8px;margin-bottom:14px;font-size:13px;font-weight:600;">
                {% for field in form %}{% for error in field.errors %}<p>{{ field.label }}: {{ error }}</p>{% endfor %}{% endfor %}
                {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
            </div>
        {% endif %}
        {{ form.as_p }}
        <button type="submit" class="btn-save">Save Employee</button>
    </form>

    <a class="back" href="{% url 'employee_list' %}">
         Back to Employee List
    </a>

</div>

</body>
</html>
