{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
Add Supplier | Nyondo Hardware
{% endblock %}

{% block content %}

<style>

/* =========================
   PAGE WRAPPER
========================= */

.page-shell{
    display: flex;
    flex-direction: column;
    gap: 24px;
    width: 100%;
}

/* =========================
   HEADER (same as stock style)
========================= */

.page-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
}

.page-header h2{
    font-size: 28px;
    color: #0F172B;
}

.page-header p{
    font-size: 14px;
    color: #64748b;
}

/* BACK BUTTON */
.back-btn{
    background: #e2e8f0;
    color: #0F172B;
    padding: 10px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    transition: 0.3s ease;
}

.back-btn:hover{
    background: #cbd5e1;
}

/* =========================
   FORM CARD
========================= */

.form-card{
    background: white;
    padding: 22px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-left: 4px solid #0F172B;
}

/* FORM ELEMENTS */
.form-card label{
    font-weight: 700;
    color: #0F172B;
    font-size: 13px;
}

.form-card input,
.form-card select,
.form-card textarea{
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    margin-top: 6px;
    margin-bottom: 14px;
    outline: none;
    transition: 0.2s ease;
}

.form-card input:focus,
.form-card select:focus,
.form-card textarea:focus{
    border-color: #0F172B;
    box-shadow: 0 0 0 3px rgba(15, 23, 43, 0.1);
}

/* =========================
   BUTTONS
========================= */

.form-actions{
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.btn{
    padding: 12px 18px;
    border-radius: 8px;
    font-weight: 800;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
}

/* PRIMARY */
.btn-primary{
    background: #0F172B;
    color: white;
}

.btn-primary:hover{
    background: #1e293b;
}

/* SECONDARY */
.btn-secondary{
    background: #e2e8f0;
    color: #0F172B;
}

.btn-secondary:hover{
    background: #cbd5e1;
}

</style>


<div class="page-shell">

    <!-- HEADER -->
    <div class="page-header">

        <div>
            <h2>Add New Supplier</h2>
            <p>Capture supplier details and manage credit tracking</p>
        </div>

        <a href="{% url 'supplier_dashboard' %}" class="back-btn">
            ← Back
        </a>

    </div>

    <!-- FORM -->
    <div class="form-card">

        <form method="POST" novalidate>
            {% csrf_token %}

            {{ form|crispy }}

            <div class="form-actions">
                <a href="{% url 'supplier_dashboard' %}" class="btn btn-secondary">
                    Cancel
                </a>

                <button type="submit" class="btn btn-primary">
                    Save Supplier
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
