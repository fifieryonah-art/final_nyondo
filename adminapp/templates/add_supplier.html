<!DOCTYPE html>
{% load crispy_forms_tags %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Add Supplier</title>

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .form-container {
            max-width: 650px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-title {
            text-align: center;
            margin-bottom: 25px;
            color: #0f172b;
            font-weight: bold;
        }

 

        label {
            font-weight: 600;
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-top: 25px;
        }


        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: 0.3s ease;
            display: inline-block;
        }


        .save-btn {
            background: #f54900;
            color: white;
        }

        .save-btn:hover {
            background: #d63f00;
        }

        .cancel-btn {
            background: #e5e7eb;
            color: #111827;
        }

        .cancel-btn:hover {
            background: #d1d5db;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h3 class="form-title">Add New Supplier</h3>

    <form method="POST" novalidate>
        {% csrf_token %}

        {{ form|crispy }}

        <div class="button-group">

    <a href="{% url 'supplier_dashboard' %}" class="btn cancel-btn">
        Cancel
    </a>

    <button type="submit" class="btn save-btn">
        Save Supplier
    </button>

</div>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
