<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Deposit</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            width:420px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            text-align:center;
            border-top:4px solid #dc2626;
        }

        h2{
            color:#dc2626;
            margin-bottom:10px;
        }

        p{
            color:#374151;
            margin-bottom:25px;
            font-size:14px;
        }

        .buttons{
            display:flex;
            justify-content:space-between;
            gap:10px;
        }

        button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            font-size:14px;
            transition:0.2s;
        }

        .delete-btn{
            background:#dc2626;
            color:white;
        }

        .delete-btn:hover{
            background:#b91c1c;
        }

        .cancel-btn{
            background:#e5e7eb;
            color:#111827;
            text-decoration:none;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:8px;
            font-weight:bold;
        }

        .cancel-btn:hover{
            background:#d1d5db;
        }

        .warning{
            background:#fff5f5;
            border:1px solid #fecaca;
            color:#991b1b;
            padding:10px;
            border-radius:8px;
            font-size:13px;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Delete Deposit</h2>

        <div class="warning">
            This action cannot be undone. All related deposit payment records will be removed.
        </div>

        <p>
            Are you sure you want to delete this deposit?
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="buttons">

                <button type="submit" class="delete-btn">
                    Yes, Delete
                </button>

                <a href="{% url 'deposit_list' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
