<!DOCTYPE html>
{% load crispy_forms_tags %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Edit Supplier</title>

    <style>
        body {
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            font-family: Arial, sans-serif;
            color: #0f172b;
            padding: 32px 16px;
        }

        .form-shell {
            max-width: 760px;
            margin: 0 auto;
        }

        .form-card {
            background: #fff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            border: 1px solid #e2e8f0;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .eyebrow {
            color: #f54900;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .form-header h1 {
            margin: 0 0 6px;
            color: #0f172b;
            font-size: 1.6rem;
        }

        .form-header p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            border: none;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #f54900;
            color: #fff;
        }

        .btn-primary:hover {
            background: #d84200;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #0f172b;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        @media(max-width: 768px) {
            .form-header {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="form-shell">
    <div class="form-card">
        <div class="form-header">
            <div>
                <p class="eyebrow">Supplier module</p>
                <h1>Edit Supplier</h1>
                <p>Update supplier details while preserving the record history.</p>
            </div>
            <a href="{% url 'supplier_dashboard' %}" class="btn btn-secondary">Back</a>
        </div>

        <form method="POST" novalidate>
            {% csrf_token %}
            {{ form|crispy }}

            <div class="form-actions">
                <a href="{% url 'supplier_dashboard' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Supplier</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
