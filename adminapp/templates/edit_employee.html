{% extends "base.html" %}

{% block content %}

<style>
.page-title {
    font-size: 32px;
    margin-bottom: 20px;
    color: #0f172b;
}

.form-card {
    background: #fff;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 4px 12px rgba(15, 23, 43, 0.08);
    max-width: 680px;
    width: 100%;
    border-top: 5px solid #0f172b;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-weight: 700;
    margin-bottom: 8px;
    color: #0f172b;
    font-size: 15px;
}

input, select {
    padding: 14px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    font-size: 15px;
    background: #fff;
}

input:focus, select:focus {
    border-color: #0f172b;
    box-shadow: 0 0 0 3px rgba(15, 23, 43, 0.08);
}

.full-width {
    grid-column: span 2;
}

.btn {
    margin-top: 20px;
    background: #0f172b;
    color: white;
    padding: 14px;
    border: none;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
}

.btn:hover {
    background: #1e293b;
}

.section-title {
    margin: 24px 0 10px;
    color: #0f172b;
    font-size: 18px;
    font-weight: 700;
}

.password-hint {
    font-size: 12px;
    color: #64748b;
    margin-top: 6px;
}
</style>

<h2 class="page-title">Edit Employee: {{ employee.user.username }}</h2>

<div class="form-card">
<form method="POST">
    {% csrf_token %}

    <div class="section-title">User Details</div>

    <div class="form-grid">

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" value="{{ employee.user.username }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ employee.user.email }}">
        </div>

    </div>

    <div class="section-title">Employee Details</div>

    <div class="form-grid">

        <div class="form-group">
            <label>Employee ID</label>
            <input type="text" name="employee_id" value="{{ employee.employee_id }}">
        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="attendant" {% if employee.role == "attendant" %}selected{% endif %}>
                    Sales Attendant
                </option>
                <option value="manager" {% if employee.role == "manager" %}selected{% endif %}>
                    Store Manager
                </option>
                <option value="admin" {% if employee.role == "admin" %}selected{% endif %}>
                    Accounts/Admin
                </option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Gender</label>
            <input type="text" name="gender" value="{{ employee.gender }}">
        </div>

    </div>

    <div class="section-title">Security</div>

    <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Leave blank to keep current password">
        <div class="password-hint">Only fill if you want to reset password</div>
    </div>

    <button type="submit" class="btn">Update Employee</button>

</form>
</div>

{% endblock %}
