{% load static %}

<link rel="stylesheet"
      href="{% static 'css/navbar.css' %}?v=202605241100">

<style>
    .brand-logo {
        height: 60px !important; /* Increased logo size for better visibility */
        width: auto;
        margin-right: 12px;
    }

    .brand {
        color: #ffffff !important; /* Changed brand text color to white */
        display: flex;
        align-items: center;
        font-weight: 700;
    }
</style>

<div class="main-navbar">

    <div class="nav-left">

        <h3 class="brand">
            <img src="{% static 'images/nyondologo.png' %}" alt="Nyondo Hardware Logo" class="brand-logo">
            Nyondo Hardware
        </h3>

    </div>

    <div class="nav-right">

        <!-- DATE -->
        <div class="nav-info-card">

            <span>Date</span>

            <h4>
                {% now "l, d M Y" %}
            </h4>

        </div>

        <!-- TIME -->
        <div class="nav-info-card">

            <span>Time</span>

            <h4>
                {% now "h:i A" %}
            </h4>

        </div>

        <!-- USER -->
        <div class="nav-info-card">

            <span>User</span>

            <h4>{{ request.user.username }}</h4>

        </div>

        <!-- ROLE -->
        <div class="nav-info-card">

            <span>Role</span>

            <h4>

                {% if request.user.is_superuser %}
                    Administrator
                {% else %}
                    Staff
                {% endif %}

            </h4>

        </div>

        </form>

    </div>

</div>
