{% extends 'base.html' %}
{% block title %} Add Product | Nyondo Hardware {% endblock %}

{% block content %}
<h2>Add Product</h2>
<form method="POST">
  {% csrf_token %}
  <label>Product Name:</label>
  <input type="text" name="name"><br>

  <label>Description:</label>
  <textarea name="description"></textarea><br>

  <label>Specification:</label>
  <input type="text" name="specification"><br>

  <label>Category:</label>
  <input type="text" name="type"><br>

    <label>Cost Price:</label>
  <input type="number" step="0.01" name="cost_price"><br>

  <label>Unit Price:</label>
  <input type="text" name="unit_price"><br>

    <label>Initial Stock:</label>
<input type="number" name="stock_quantity" value="0"><br>

   <label>Reorder Level:</label>
  <input type="number" step="0.01" name="reorder_level"><br>

  <button type="submit">Save Product</button>
</form>
{% endblock %}
