<!DOCTYPE html>

{% load static %}

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Products | Nyondo Hardware</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CUSTOM CSS -->

    <link rel="stylesheet"
          href="{% static 'css/add_product.css' %}?v=20260525">

</head>

<body>

<div class="container">

    <div class="card">

        <!-- HEADER -->

        <div class="card-header">

            <div class="header-icon">
                <i class="fas fa-box-open"></i>
            </div>

            <div>
                <h2>Add Product</h2>
                <p>Enter product details and stock information</p>
            </div>

        </div>

        <!-- FORM -->

        <form method="POST" class="form-grid">

            {% csrf_token %}

            <!-- PRODUCT NAME -->

            <div class="form-group">

                <label>
                    <i class="fas fa-tag"></i>
                    Product Name
                </label>

                <input type="text"
                       name="name"
                       placeholder="Enter product name"
                       required>

            </div>

            <!-- DESCRIPTION -->

            <div class="form-group">

                <label>
                    <i class="fas fa-align-left"></i>
                    Description
                </label>

                <input type="text"
                       name="description"
                       placeholder="Enter product description">

            </div>

            <!-- SPECIFICATION -->

            <div class="form-group">

                <label>
                    <i class="fas fa-list"></i>
                    Specification
                </label>

                <input type="text"
                       name="specification"
                       placeholder="Enter specification">

            </div>

            <!-- CATEGORY -->

            <div class="form-group">

                <label>
                    <i class="fas fa-layer-group"></i>
                    Category
                </label>

                <input type="text"
                       name="type"
                       placeholder="Enter product category">

            </div>

            <!-- COST PRICE -->

            <div class="form-group">

                <label>
                    <i class="fas fa-money-bill"></i>
                    Cost Price
                </label>

                  <input type="number"
                      step="0.01"
                      min="0"
                      id="costPrice"
                      name="cost_price"
                      placeholder="Enter cost price"
                      required>

            </div>

            <!-- UNIT PRICE -->

            <div class="form-group">

                <label>
                    <i class="fas fa-coins"></i>
                    Unit Price
                </label>

                  <input type="number"
                      step="0.01"
                      min="0"
                      id="unitPrice"
                      name="unit_price"
                      placeholder="Enter selling price"
                      required>

                  <small id="unitError" style="color:red; display:none; margin-top:8px;">Unit price must be greater than or equal to cost price.</small>

            </div>

            <!-- STOCK -->

            <div class="form-group">

                <label>
                    <i class="fas fa-warehouse"></i>
                    Initial Stock
                </label>

                  <input type="number"
                      name="stock_quantity"
                      value="0"
                      min="0"
                      required>

            </div>

            <!-- REORDER LEVEL -->

            <div class="form-group">

                <label>
                    <i class="fas fa-triangle-exclamation"></i>
                    Reorder Level
                </label>

                <input type="number"
                       step="0.01"
                       name="reorder_level"
                       placeholder="Enter reorder level">

            </div>

            <!-- BUTTONS -->

            <div class="button-group">

                <button type="submit" class="btn-save">

                    <i class="fas fa-save"></i>

                    Save Product

                </button>

                <a href="{% url 'product_list' %}"
                   class="btn-cancel">

                    <i class="fas fa-times"></i>

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

<script>
    const costPrice = document.getElementById('costPrice');
    const unitPrice = document.getElementById('unitPrice');
    const unitError = document.getElementById('unitError');

    function validatePrices() {
        const cp = parseFloat(costPrice.value) || 0;
        const up = parseFloat(unitPrice.value) || 0;

        if (up < 0) {
            unitPrice.value = '';
            alert('Unit price cannot be negative');
            return;
        }

        if (up < cp) {
            unitError.style.display = 'block';
            unitPrice.style.border = '2px solid red';
        } else {
            unitError.style.display = 'none';
            unitPrice.style.border = '';
        }
    }

    if (costPrice && unitPrice) {
        costPrice.addEventListener('input', validatePrices);
        unitPrice.addEventListener('input', validatePrices);
    }
</script>

</html>
