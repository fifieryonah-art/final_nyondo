{% extends 'base.html' %}

{% block sidebar %}
    {% include 'salessidebar.html' %}
{% endblock %}

{% block title %}
    New Sale
{% endblock %}

{% block extra_css %}
<style>
/* your CSS stays exactly the same */
</style>
{% endblock %}

{% block content %}

<div class="sale-wrapper">
    <div class="sale-card">

        <div class="card-header">
            <h4 class="title"><i class="fas fa-cart-plus"></i> New Sale</h4>
            <p>Record a new sales transaction</p>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <!-- YOUR FORM CONTENT STAYS SAME -->

                <div class="buttons">
                    <button type="submit" class="btn-save">
                        Complete Sale & Print Receipt
                    </button>

                    <a href="{% url 'sales_list' %}" class="btn-cancel">
                        Cancel
                    </a>
                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
