{% extends 'base.html' %}

{% block title %}
    New Sale
{% endblock %}

{% block extra_css %}
<style>

.sale-wrapper{
    background: #f3f4f6;
    min-height: 100vh;
    padding: 30px;
}


.sale-card{
    max-width: 1100px;
    margin: auto;
    background: white;
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card-header{
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 35px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 20px;
}


.header-icon{
    width: 70px;
    height: 70px;
    background: #fff1e8;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
}


.header-icon i{
    color: #ff5a00;
    font-size: 30px;
}


.title{
    font-size: 38px;
    color: #0f172a;
    margin-bottom: 5px;
}


.card-header p{
    color: #64748b;
}




.form-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}


.three-cols{
    grid-template-columns: 1fr 1fr 1fr;
}


.items-section{
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 25px;
}


.items-section h4{
    margin-bottom: 20px;
    color: #111827;
}




.form-group label{
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #334155;
}

.form-group{
    display: flex;
    flex-direction: column;
}


.form-group input,
.form-group select,
.form-group textarea{
    width: 100%;
    padding: 14px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    outline: none;
    font-size: 15px;
    background: white;
    height: 52px;
    box-sizing: border-box;
}


.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color: #ff5a00;
}


.total-box{
    margin-bottom: 25px;
}


.total-box label{
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}


.total-box input{
    width: 100%;
    padding: 15px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    background: #f8fafc;
    font-size: 18px;
    font-weight: bold;
}


.buttons{
    display: flex;
    gap: 20px;
    margin-top: 30px;
}


.btn-save{
    flex: 1;
    padding: 16px;
    border: none;
    background: #ff5a00;
    color: white;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}


.btn-save:hover{
    background: #e14f00;
}


.btn-cancel{
    flex: 1;
    padding: 16px;
    background: #e2e8f0;
    color: #111827;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    font-weight: 600;
}

</style>

{% endblock %}
{% block content %}
<div class="sale-wrapper">
    <div class="sale-card">
        <div class="card-header">
            <h4 class="title"><i class="fas fa-cart-plus"></i> New Sale</h4>
            <p>Record a new sales transaction</p>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Customer</label>
                        <select name="customer_name">
                            {% for customer in customers %}
                                <option value="{{ customer.id }}">{{ customer.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Distance (km)</label>
                        <input type="number" name="distance" step="0.01" placeholder="Enter delivery distance">
                    </div>
                </div>

                <div class="items-sections">
                <h5>Add Item</h5>
                <div class="form-row three-cols ">
                    <div class="form-group">
                        <label>Product</label>
                        <select name="product" id="product-select">
                            {% for product in products %}
                                <option value="{{ product.id }}" data-price="{{ product.unit_price }}">{{ product.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" name="quantity" id="quantity-input">
                    </div>

                    <div class="col">
                        <label>Unit Price</label>
                        <input type="number" name="unit_price" id="unit-price">
                    </div>
                </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Payment Method</label>
                          <select name="payment_method" class="form-control">
                                {% for key, value in payment_methods %}
                                <option value="{{ key }}">{{ value }}</option>
                                    {% endfor %}
                          </select>
                    </div>

                    <div class="form-group">
                        <label>Comments</label>
                        <textarea name="comments" class="form-control" rows="2"></textarea>
                    </div>
                </div>

                {% if total %}
                <div class="total-box">
                        <label>Total Amount</label>
                        <input type="text" value="{{ total }}">
                    </div>
                </div>
                {% endif %}

                <!-- Submit -->
                <div class="buttons">
                    <button type="submit" class="btn-save">Complete Sale & Print Receipt</button>
                    <a href="{% url 'sales_list' %}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
