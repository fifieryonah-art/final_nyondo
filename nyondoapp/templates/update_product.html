{% extends 'base.html' %}
{% load static %}

{% block title %}
Update Stock
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/update_product.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Edit Stock</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Product -->
        <label>Product</label>
        <input type="text" name="product"
               value="{{ product.name }}" readonly>

        <!-- Quantity -->
        <label>Quantity</label>
        <input type="number"
               name="quantity"
               value="{{ stock.quantity }}">

        <!-- Cost Price -->
        <label>Cost Price</label>
        <input type="text"
               name="cost_price"
               value="{{ product.cost_price }}">

        <!-- Unit Price -->
        <label>Unit Price</label>
        <input type="text"
               name="unit_price"
               value="{{ product.unit_price }}">

        <!-- Profit Margin -->
        <label>Profit Margin</label>
        <input type="text"
               name="profit_margin"
               value="{{ product.profit_margin }}">

        <!-- Comments -->
        <label>Comments</label>
        <textarea name="comments">{{ stock.comments }}</textarea>

        <button type="submit" class="btn">
            Update Stock
        </button>

    </form>

</div>

{% endblock %}
