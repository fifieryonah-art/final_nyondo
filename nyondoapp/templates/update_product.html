{% extends 'base.html' %}
{% load static %}

{% block title %}
    Update Stock
{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/stock_update.css' %}">
    <style>
        .form-card {
            max-width: 600px !important;
            margin: 0 auto !important;
        }
    </style>
{% endblock %}

{% block content %}

<div class="form-wrapper">

    <div class="form-card">

        <div class="form-header">

            <i class="fas fa-pen-to-square"></i>

            <div>
                <h2>Edit Stock</h2>
                <p>Update stock information</p>
            </div>

        </div>

        <form method="post" class="form">
            {% csrf_token %}

            <div class="form-group">
                <label>Product</label>
                <input type="text" name="product" value="{{ product.name }}" readonly>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" value="{{ stock.quantity }}">
            </div>

            <div class="form-group">
                <label>Cost Price</label>
                <input type="text" name="cost_price" value="{{ product.cost_price }}">
            </div>

            <div class="form-group">
                <label>Unit Price</label>
                <input type="text" name="unit_price" value="{{ product.unit_price }}">
            </div>

            <div class="form-group">
                <label>Profit Margin</label>
                <input type="text" name="profit_margin" value="{{ product.profit_margin }}">
            </div>

            <div class="form-group">
                <label>Comments</label>
                <textarea name="comments" rows="4">{{ stock.comments }}</textarea>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-update">
                    <i class="fas fa-save"></i>
                    Update Stock
                </button>

                <a href="{% url 'product_list' %}" class="btn-cancel">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
