<!DOCTYPE html>

{% load static %}
{% load crispy_forms_tags %}

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Customer | Nyondo Hardware</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{% static 'css/add_customer.css' %}">

</head>

<body>

<div class="page-wrapper">

    <div class="form-card">

        <!-- HEADER -->

        <div class="form-header">

            <div class="icon-box">
                <i class="fas fa-user-plus"></i>
            </div>

            <div>
                <h2>Add Customer</h2>
                <p>Create a new customer profile</p>
            </div>

        </div>

        <!-- FORM -->

        <form method="POST" novalidate>

            {% csrf_token %}

            <div class="form-body">

                {{ form|crispy }}

            </div>

            <!-- BUTTONS -->

            <div class="button-group">

                <button type="submit" class="btn-save">

                    <i class="fas fa-save"></i>

                    Save Customer

                </button>

                <a href="{% url 'customer_list' %}" class="btn-cancel">

                    <i class="fas fa-times"></i>

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
