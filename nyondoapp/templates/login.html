<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nyondo Hardware</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0B1F3A, #102B52, #163A6B);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* WRAPPER */

        .login-wrapper{
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */

        .login-card{
            width: 360px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* HEADER */

        .login-header h2{
            color: #F54900;
            margin-bottom: 8px;
        }

        .login-header p{
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* FORM GROUP */

        .form-group{
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label{
            display: block;
            color: #e2e8f0;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group i{
            margin-right: 6px;
            color: #F54900;
        }

        /* INPUTS */

        .form-group input{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-group input::placeholder{
            color: #94a3b8;
        }

        /* BUTTON */

        .btn-login{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #F54900;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-login:hover{
            background: #e63e00;
            transform: translateY(-2px);
        }

        /* RESPONSIVE */

        @media(max-width: 500px){
            .login-card{
                width: 90%;
                padding: 30px;
            }
        }

    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">
        <!-- DJANGO MESSAGES -->
        {% if messages %}
            <div class="form-messages" style="margin-bottom: 15px; text-align: left;">
                {% for message in messages %}
                    <p class="{{ message.tags }}" style="color: #f87171; font-size: 13px; background: rgba(220, 38, 38, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(220, 38, 38, 0.2);">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="login-form" novalidate>

            {% csrf_token %}

            <!-- HEADER -->

            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>

            <!-- USERNAME -->

            <div class="form-group">

                <label>
                    <i class="fas fa-user"></i>
                    Username
                </label>

                <input type="text"
                       name="username"
                       placeholder="Enter username">
            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <label>
                    <i class="fas fa-lock"></i>
                    Password
                </label>

                <input type="password"
                       name="password"
                       placeholder="Enter password">
            </div>

            <!-- BUTTON -->

            <button type="submit" class="btn-login">

                <i class="fas fa-right-to-bracket"></i>
                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
