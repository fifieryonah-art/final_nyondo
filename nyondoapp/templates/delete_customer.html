<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Customer| Nyondo hardware</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .delete-box{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        h3{
            color: #dc2626;
            margin-bottom: 10px;
        }

        p{
            margin-bottom: 20px;
            color: #555;
        }

        .btn{
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-delete{
            background: #dc2626;
            color: white;
        }
        
        .btn-cancel{
            background: #6b7280;
            color: white;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="delete-box">
   <h3>Delete Customer</h3> 

   <p>Are you sure you want to delete <strong>{{ customer.name }}</strong></p>

   <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-delete">Yes, Delete</button>
    <a href="{% url 'customer_list' %}" class="btn btn-cancel">Cancel</a>
   </form>
   </div>
</body>
</html>
