{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nyondo Hardware{% endblock %}</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f8fafc;
        }

        .layout{
            display: flex;
        }

        .main-content{
            flex: 1;
            padding: 25px;
            margin-left: 260px;
        }

        footer{
            margin-top: 30px;
            background: white;
            padding: 16px;
            text-align: center;
            border-radius: 12px;
            color: #64748b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="layout">

    <!-- SIDEBAR SLOT -->
    {% block sidebar %}{% endblock %}

    <!-- MAIN CONTENT -->
    <div class="main-content">

        {% include 'navbar.html' %}

        {% block content %}{% endblock %}

        <footer>
            <p>&copy; 2026 Nyondo Hardware System</p>
        </footer>

    </div>

</div>

</body>
</html>
