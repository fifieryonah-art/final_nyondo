{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Nyondo Hardware
        {% endblock %}
    </title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- BASE CSS -->

    <link rel="stylesheet"
          href="{% static 'css/base.css' %}">

    <!-- EXTRA PAGE CSS -->

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- PAGE WRAPPER -->

    <div class="layout-wrapper">

        <!-- SIDEBAR -->

        <aside class="sidebar-section">

            {% block sidebar %}
            {% endblock %}

        </aside>

        <!-- MAIN CONTENT -->

        <main class="main-content">

            <!-- NAVBAR -->

            <header class="top-navbar">

                {% include 'navbar.html' %}

            </header>

            <!-- PAGE CONTENT -->

            <section class="content-area">

                {% block content %}
                {% endblock %}

            </section>

            <!-- FOOTER -->

            <footer class="footer">

                <p>
                    <i class="fas fa-copyright"></i>
                    2026 Nyondo Hardware System
                </p>

            </footer>

        </main>

    </div>

</body>

</html>
