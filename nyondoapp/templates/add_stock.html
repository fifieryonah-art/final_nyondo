<!DOCTYPE html>

{% load static %}

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Stock | Nyondo Hardware</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CUSTOM CSS -->

    <link rel="stylesheet"
          href="{% static 'css/add_stock.css' %}" />

</head>

<body>

<div class="container">

    <div class="card">

        <!-- HEADER -->

        <div class="card-header">

            <div class="header-icon">
                <i class="fas fa-boxes-stacked"></i>
            </div>

            <div>
                <h2>Add New Stock</h2>
                <p>Enter product details and stock information</p>
            </div>

        </div>

        <!-- FORM -->

        <form method="POST" class="stock-form">

            {% csrf_token %}

            <!-- PRODUCT + SUPPLIER -->

            <div class="form-row">

                <div class="form-group">

                    <label>
                        <i class="fas fa-box"></i>
                        Product
                    </label>

                    <select name="product" required>

                        <option value="">Select Product</option>

                        {% for product in products %}

                            <option value="{{ product.id }}">
                                {{ product.name }}
                            </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fas fa-truck"></i>
                        Supplier
                    </label>

                    <select name="supplier" required>

                        <option value="">Select Supplier</option>

                        {% for supplier in suppliers %}

                            <option value="{{ supplier.id }}">
                                {{ supplier.name }}
                            </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <!-- STOCK DETAILS -->

            <div class="form-row">

                <div class="form-group">

                    <label>
                        <i class="fas fa-layer-group"></i>
                        Quantity
                    </label>

                    <input type="number"
                           name="quantity"
                           placeholder="Enter quantity"
                           required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fas fa-money-bill"></i>
                        Cost Price
                    </label>

                    <input type="number"
                           step="0.01"
                           name="cost_price"
                           placeholder="Enter cost price"
                           required>

                </div>

            </div>

            <!-- UNIT PRICE + TOTAL -->

            <div class="form-row">

                <div class="form-group">

                    <label>
                        <i class="fas fa-coins"></i>
                        Unit Price
                    </label>

                    <input type="number"
                           step="0.01"
                           name="unit_price"
                           placeholder="Enter selling price"
                           required>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fas fa-calculator"></i>
                        Total Cost
                    </label>

                    <input type="number"
                           step="0.01"
                           name="total_cost"
                           placeholder="Enter total cost">

                </div>

            </div>

            <!-- PAYMENT + ENTERED BY -->

            <div class="form-row">

                <div class="form-group checkbox-group">

                    <label class="checkbox-label">

                        <input type="checkbox"
                               name="is_paid"
                               checked>

                        Payment Completed

                    </label>

                </div>

                <div class="form-group">

                    <label>
                        <i class="fas fa-user-pen"></i>
                        Entered By
                    </label>

                    <input type="text"
                           name="entered_by"
                           placeholder="Enter staff name">

                </div>

            </div>

            <!-- COMMENTS -->

            <div class="form-group">

                <label>
                    <i class="fas fa-comment-dots"></i>
                    Comments
                </label>

                <textarea name="comments"
                          rows="4"
                          placeholder="Enter stock comments..."></textarea>

            </div>

            <!-- BUTTONS -->

            <div class="buttons">

                <button type="submit"
                        class="btn-save">

                    <i class="fas fa-save"></i>

                    Save Stock

                </button>

                <a href="{% url 'stock_list' %}"
                   class="btn-cancel">

                    <i class="fas fa-times"></i>

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
