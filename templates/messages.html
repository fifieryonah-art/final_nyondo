{% if messages %}
<div class="dj-messages">
    {% for message in messages %}
    <div class="dj-msg dj-msg-{{ message.tags }}">
        <i class="fas {% if message.tags == 'error' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %}"></i>
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

<style>
.dj-messages { display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.dj-msg { display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:8px; font-size:13px; font-weight:600; }
.dj-msg-error   { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
.dj-msg-success { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
.dj-msg-info, .dj-msg-warning { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }

/* RED FIELD STYLES — applied when Django returns field errors */
.input-error { border: 2px solid #dc2626 !important; background: #fff5f5 !important; }
.field-error-msg { color: #b91c1c; font-size: 12px; font-weight: 600; margin-top: 4px; display: block; }

/* Crispy forms error styling */
.is-invalid { border: 2px solid #dc2626 !important; background: #fff5f5 !important; }
.invalid-feedback { display: block !important; color: #b91c1c; font-size: 12px; font-weight: 600; margin-top: 4px; }
</style>
